services:
  # Node.js Backend
  - type: web
    name: kerala-farmer-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: WEATHER_API_KEY
        sync: false
      - key: PORT
        value: 10000

  # Flask ML API
  - type: web
    name: kerala-farmer-ml
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python ml_api.py
    envVars:
      - key: PORT
        value: 10000

  # Next.js Frontend
  - type: web
    name: kerala-farmer-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: BACKEND_URL
        sync: false
      - key: NEXT_PUBLIC_BACKEND_URL
        sync: false
