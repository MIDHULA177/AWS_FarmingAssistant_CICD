name: Frontend CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t midhula17/frontend-deployment:${{ github.sha }} ./frontend
          docker tag midhula17/frontend-deployment:${{ github.sha }} midhula17/frontend-deployment:latest

      - name: Push Docker Images
        run: |
          docker push midhula17/frontend-deployment:${{ github.sha }}
          docker push midhula17/frontend-deployment:latest
 
